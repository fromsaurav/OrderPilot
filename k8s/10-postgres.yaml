# Self-hosted PostgreSQL (Decision #2): StatefulSet on a k3s local-path PV (no EBS-CSI).
# Serves both Temporal (temporal / temporal_visibility DBs, created by the init script) and the
# app (orderpilot DB, via POSTGRES_DB). Pinned to the server node.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: orderpilot
data:
  01-temporal-dbs.sql: |
    -- App DB (orderpilot) is created by the image via POSTGRES_DB; create Temporal's two here.
    CREATE DATABASE temporal;
    CREATE DATABASE temporal_visibility;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: orderpilot
spec:
  clusterIP: None          # headless; `postgres` resolves to the pod IP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: orderpilot
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_DB
              value: orderpilot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orderpilot-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal", "-d", "orderpilot"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 3Gi
